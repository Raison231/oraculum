<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORACULUM ∞ v2 — Deep Unified Field Engine</title>
<style>
:root{--bg:#08090d;--surface:#11131b;--raised:#181b27;--panel:#0e1016;--border:rgba(255,255,255,0.08);--text:#f4f1ea;--muted:rgba(244,241,234,0.62);--gold:#d7b05a;--gold-glow:rgba(215,176,90,0.18);--cyan:#62cfdf;--green:#78c693;--orange:#e2985e;--red:#ec7b6e;--purple:#b597e6;--font:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh;background:radial-gradient(1400px 700px at 8% -14%,rgba(215,176,90,0.14),transparent 58%),radial-gradient(900px 500px at 110% 0%,rgba(98,207,223,0.10),transparent 52%),radial-gradient(600px 600px at 50% 120%,rgba(181,151,230,0.08),transparent 50%),var(--bg)}
.wrap{max-width:1280px;margin:0 auto;padding:28px 22px 80px}
header{display:grid;gap:14px;margin-bottom:30px}
.badge{display:inline-flex;align-items:center;gap:8px;width:fit-content;padding:6px 14px;border:1px solid rgba(215,176,90,0.35);border-radius:999px;background:var(--gold-glow);color:var(--gold);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700}
h1{margin:0;font-size:clamp(34px,5.5vw,56px);line-height:1.05;font-weight:750;letter-spacing:-0.03em}h1 span{color:var(--gold);text-shadow:0 0 40px rgba(215,176,90,0.25)}
.lede{margin:0;max-width:66ch;color:var(--muted);font-size:17px;line-height:1.6}
.tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.tab{background:var(--raised);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:10px 18px;font-size:13px;cursor:pointer;transition:all .15s ease;font-weight:600}
.tab.active{background:var(--gold);color:#14110a;border-color:var(--gold);box-shadow:0 0 22px rgba(215,176,90,0.25)}
.tab:hover:not(.active){color:var(--text);border-color:rgba(215,176,90,0.45);background:#202434}
.section{display:none;animation:fadeIn .25s ease}.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.grid{display:grid;grid-template-columns:1fr;gap:22px}
@media(min-width:980px){.grid{grid-template-columns:1fr 1.28fr;align-items:start}}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.04),transparent 40%),var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,0.35)}
.card h2{margin:0 0 16px;font-size:13px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);font-weight:700}
.card h3{margin:16px 0 10px;font-size:14px;color:var(--text);font-weight:700}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
.input-row{display:flex;gap:12px;flex-wrap:wrap}
input[type=text],input[type=date],input[type=time],input[type=number]{flex:1;min-width:130px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;outline:none}
input:focus{border-color:rgba(215,176,90,0.55);box-shadow:0 0 0 4px rgba(215,176,90,0.10)}
button.primary{background:linear-gradient(180deg,#e5c26f,#c99a3d);color:#1a160d;border:0;border-radius:12px;padding:0 20px;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap;min-height:46px;box-shadow:0 4px 16px rgba(215,176,90,0.22)}
button.primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
.hint{color:var(--muted);font-size:13px;margin-top:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:7px 13px;font-size:12px;cursor:pointer}
.chip:hover{color:var(--text);border-color:rgba(215,176,90,0.45);background:var(--raised)}
.verdict{display:none;margin-bottom:18px;padding:18px 20px;border-radius:14px;border:1px solid var(--border);background:var(--raised)}
.verdict.show{display:block}.verdict .row{display:flex;flex-wrap:wrap;gap:14px 24px;align-items:baseline}
.verdict .tag{font-size:13px;font-weight:900;letter-spacing:0.08em;padding:7px 11px;border-radius:8px}
.verdict.ok .tag{background:rgba(120,198,147,0.16);color:var(--green)}.verdict.mid .tag{background:rgba(226,152,94,0.16);color:var(--orange)}.verdict.bad .tag{background:rgba(236,123,110,0.16);color:var(--red)}
.meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
.score{margin-left:auto;font-size:32px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
.score small{font-size:14px;color:var(--muted);font-weight:500}
.lenses{display:grid;gap:14px}
.lens{border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,0.02);overflow:hidden}
.lens-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px rgba(215,176,90,0.8)}
.lens-head h3{margin:0;font-size:14px;font-weight:700}
.lens ul{margin:0;padding:13px 16px 15px 34px;color:var(--muted);font-size:14px;line-height:1.55}
.lens li{margin:4px 0}
.empty{color:var(--muted);font-size:15px;line-height:1.55;padding:30px 10px;text-align:center}
.canvas-wrap{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#0b0d12}
canvas{display:block;width:100%;height:auto}
.map-meta{margin-top:12px;font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.map-meta span{padding:4px 8px;background:var(--raised);border-radius:6px}
.result{display:none;margin-top:16px;background:var(--raised);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:14px;line-height:1.55}
.result.show{display:block}
.insight{background:var(--gold-glow);border-left:3px solid var(--gold);padding:12px 16px;margin:10px 0;border-radius:0 10px 10px 0;color:var(--text)}
.kv{display:flex;flex-wrap:wrap;gap:8px 18px;margin:8px 0}
.kv span{font-size:13px;color:var(--muted)}.kv strong{color:var(--text);font-weight:700}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:8px;font-size:12px;border:1px solid var(--border);background:var(--panel)}
.table-wrap{max-height:460px;overflow:auto;border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--border)}
th{position:sticky;top:0;background:var(--raised);color:var(--muted);font-weight:700;z-index:1}
tr:hover td{background:rgba(255,255,255,0.03)}
.peak td{background:rgba(120,198,147,0.08)}.money td{background:rgba(215,176,90,0.08)}.bad td{background:rgba(236,123,110,0.06)}
.ring-bar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.ring{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;font-size:12px;border:1px solid var(--border)}
.ring.on{background:rgba(120,198,147,0.12);border-color:rgba(120,198,147,0.35);color:var(--green)}
.ring.off{background:var(--panel);color:var(--muted)}
.module{padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.01)}
.module .num{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--gold);color:#1a160d;font-weight:800;font-size:12px;line-height:24px;text-align:center;margin-right:8px}
.spectrum{display:grid;grid-template-columns:repeat(auto-fit,minmax(52px,1fr));gap:6px;margin-top:10px}
.spectrum .bar{height:80px;background:var(--panel);border-radius:8px;position:relative;overflow:hidden;border:1px solid var(--border)}
.spectrum .fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--gold),rgba(215,176,90,0.25));border-radius:0 0 8px
